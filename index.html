<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Shared Bookmarks</title>
    <link href="style.css" rel="stylesheet" />
</head>
<body>
    <main>
        <h1>ShareMarks</h1>
        <div id="container">
            <!-- display new bookmarks -->
            <div id="add-bookmark-div">
                <h2>Add new bookmark</h2>
                <form action="" id="bookmark-form">
                    <!-- user selector to know which user adds this bookmark -->
                    <div> You are: <br>
                        <div class="user-radio-selections">
                            <input type="radio" id="user1" name="user-submit" value="1" required>
                            <label for="user1">User 1</label><br>
                            <input type="radio" id="user2" name="user-submit" value="2" required>
                            <label for="user2">User 2</label><br>
                            <input type="radio" id="user3" name="user-submit" value="3" required>
                            <label for="user3">User 3</label><br>
                            <input type="radio" id="user4" name="user-submit" value="4" required>
                            <label for="user4">User 4</label><br>
                            <input type="radio" id="user5" name="user-submit" value="5" required>
                            <label for="user5">User 5</label><br>
                        </div>
                    </div>
                    <label for="title">Title:</label>
                    <input type="text" id="title" name="title" placeholder="Enter bookmark title..." required>
                    <label for="url">URL:</label>
                    <input type="text" id="url" name="url" placeholder="Enter bookmark link..." required>
                    <label for="description">Description:</label>
                    <textarea type="text" id="description" name="description" rows="4" cols="50" placeholder="Enter bookmark description..." required></textarea>
                    <div class="submit-button-parent-div">
                        <input type="submit" value="Submit" id="submit-button">
                    </div>
                </form>
            </div>
            <!-- drop down selector -->
            <div id="display-user-selector">
                <label for="users-selector">Show bookmarks of this user: </label>
                <select name="user" id="users-selector">
                </select>
            </div>
        <!-- bookmark card -->
            <div id="bookmark-display-div"></div>
        </div>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
